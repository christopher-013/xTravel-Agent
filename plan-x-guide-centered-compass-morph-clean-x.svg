<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Plan × Guide centered compass morph icon clean X</title>
  <desc id="desc">A centered compass with two needles spins, then morphs into a clean two-stroke X.</desc>
  <defs>
    <radialGradient id="bg" cx="38%" cy="25%" r="82%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="48%" stop-color="#e7f9ff"/>
      <stop offset="100%" stop-color="#9cdfff"/>
    </radialGradient>

    <linearGradient id="rim" x1="34" y1="14" x2="205" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#cdefff"/>
      <stop offset="100%" stop-color="#69bde8"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#123447" flood-opacity="0.18"/>
    </filter>

    <filter id="lineShadow" x="-45%" y="-45%" width="190%" height="190%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.8" flood-color="#061827" flood-opacity="0.24"/>
    </filter>

    <style>
      .circle-base{filter:url(#softShadow)}
      .compass-details{animation:detailsOut 4s ease forwards;transform-origin:120px 120px;transform-box:view-box}
      .hub{animation:hubOut 4s ease forwards;transform-origin:120px 120px;transform-box:view-box}
      .spin-needles{animation:spinFade 4s ease forwards;filter:url(#lineShadow)}
      .final-x{opacity:0;animation:xShow 1.05s cubic-bezier(.16,.82,.2,1) 2.92s forwards;filter:url(#lineShadow)}
      .final-hub{opacity:0;animation:xShow 1.05s cubic-bezier(.16,.82,.2,1) 3s forwards}
      @keyframes detailsOut{0%,58%{opacity:1}78%{opacity:.18}100%{opacity:0}}
      @keyframes hubOut{0%,60%{opacity:1;transform:scale(1)}80%{opacity:.12;transform:scale(.42)}100%{opacity:0;transform:scale(.08)}}
      @keyframes spinFade{0%,72%{opacity:1}88%,100%{opacity:0}}
      @keyframes xShow{0%{opacity:0}10%{opacity:1}100%{opacity:1}}
      @media (prefers-reduced-motion: reduce){
        .compass-details,.hub,.spin-needles{animation:none;opacity:0}
        .final-x,.final-hub{animation:none;opacity:1}
      }
    </style>
  </defs>

  <!-- Everything is centered on 120,120. No translate offset. -->
  <circle class="circle-base" cx="120" cy="120" r="88" fill="url(#bg)" stroke="url(#rim)" stroke-width="7"/>
  <circle cx="120" cy="120" r="78" fill="none" stroke="#ffffff" stroke-opacity=".75" stroke-width="1.5"/>

  <!-- Compass markings fade out while the two compass needles spin. -->
  <g class="compass-details">
    <circle cx="120" cy="120" r="69" fill="none" stroke="#123447" stroke-opacity=".23" stroke-width="1.3"/>
    <circle cx="120" cy="120" r="61" fill="none" stroke="#123447" stroke-opacity=".10" stroke-width="1"/>

    <g stroke="#123447" stroke-linecap="round" opacity=".46">
      <line x1="120" y1="42" x2="120" y2="53" stroke-width="2"/>
      <line x1="120" y1="187" x2="120" y2="198" stroke-width="2"/>
      <line x1="42" y1="120" x2="53" y2="120" stroke-width="2"/>
      <line x1="187" y1="120" x2="198" y2="120" stroke-width="2"/>
      <line x1="65" y1="65" x2="72" y2="72" stroke-width="1.25"/>
      <line x1="175" y1="65" x2="168" y2="72" stroke-width="1.25"/>
      <line x1="65" y1="175" x2="72" y2="168" stroke-width="1.25"/>
      <line x1="175" y1="175" x2="168" y2="168" stroke-width="1.25"/>
    </g>

    <g font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle" dominant-baseline="middle">
      <text x="120" y="63">N</text>
      <text x="180" y="123">E</text>
      <text x="120" y="178">S</text>
      <text x="60" y="123">W</text>
    </g>

    <g font-family="Georgia, 'Times New Roman', serif" font-size="9" font-weight="700" fill="#111827" fill-opacity=".72" text-anchor="middle" dominant-baseline="middle">
      <text x="160" y="80" transform="rotate(35 160 80)">NE</text>
      <text x="80" y="80" transform="rotate(-35 80 80)">NW</text>
      <text x="160" y="160" transform="rotate(-35 160 160)">SE</text>
      <text x="80" y="160" transform="rotate(35 80 160)">SW</text>
    </g>
  </g>

  <!-- Starting state: only two long compass needles, like a real compass. -->
  <g class="spin-needles">
    <g>
      <line x1="120" y1="120" x2="120" y2="49" stroke="#111827" stroke-width="15" stroke-linecap="round" opacity=".23"/>
      <line x1="120" y1="120" x2="120" y2="49" stroke="#e63b35" stroke-width="9" stroke-linecap="round"/>
      <line x1="120" y1="120" x2="120" y2="191" stroke="#111827" stroke-width="15" stroke-linecap="round" opacity=".23"/>
      <line x1="120" y1="120" x2="120" y2="191" stroke="#2e6fb7" stroke-width="9" stroke-linecap="round"/>

      <!-- Slight initial slant to match the reference image, while still rotating around the true center. -->
      <animateTransform attributeName="transform" type="rotate" values="13 120 120;1093 120 120" dur="3s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines=".32 0 .18 1"/>
    </g>
  </g>

  <!-- Final X grows from the exact center. Clean two-stroke version; no overlapping extra lines. -->
  <g class="final-x" stroke-linecap="round">
    <!-- red diagonal: top-left to bottom-right -->
    <line x1="120" y1="120" x2="120" y2="120" stroke="#111827" stroke-width="18" opacity=".22">
      <animate attributeName="x1" from="120" to="68" dur=".95s" begin="3s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="y1" from="120" to="68" dur=".95s" begin="3s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="x2" from="120" to="172" dur=".95s" begin="3s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="y2" from="120" to="172" dur=".95s" begin="3s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
    </line>
    <line x1="120" y1="120" x2="120" y2="120" stroke="#e63b35" stroke-width="11">
      <animate attributeName="x1" from="120" to="68" dur=".95s" begin="3s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="y1" from="120" to="68" dur=".95s" begin="3s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="x2" from="120" to="172" dur=".95s" begin="3s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="y2" from="120" to="172" dur=".95s" begin="3s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
    </line>

    <!-- blue diagonal: bottom-left to top-right -->
    <line x1="120" y1="120" x2="120" y2="120" stroke="#111827" stroke-width="18" opacity=".22">
      <animate attributeName="x1" from="120" to="68" dur=".95s" begin="3.05s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="y1" from="120" to="172" dur=".95s" begin="3.05s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="x2" from="120" to="172" dur=".95s" begin="3.05s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="y2" from="120" to="68" dur=".95s" begin="3.05s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
    </line>
    <line x1="120" y1="120" x2="120" y2="120" stroke="#2e6fb7" stroke-width="11">
      <animate attributeName="x1" from="120" to="68" dur=".95s" begin="3.05s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="y1" from="120" to="172" dur=".95s" begin="3.05s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="x2" from="120" to="172" dur=".95s" begin="3.05s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
      <animate attributeName="y2" from="120" to="68" dur=".95s" begin="3.05s" fill="freeze" calcMode="spline" keySplines=".16 .82 .2 1"/>
    </line>
  </g>

  <g class="hub">
    <circle cx="120" cy="120" r="14" fill="#ffffff" stroke="#111827" stroke-opacity=".18" stroke-width="3"/>
    <circle cx="120" cy="120" r="6" fill="#111827" opacity=".45"/>
  </g>

  <g class="final-hub">
    <circle cx="120" cy="120" r="15" fill="#ffffff" stroke="#111827" stroke-opacity=".18" stroke-width="3"/>
    <circle cx="120" cy="120" r="6" fill="#111827" opacity=".55"/>
  </g>
</svg>