name: Deploy PlanToGuide

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify application and export fallbacks
        run: |
          npm run check
          npm run smoke
      - name: Precompute destination catalogs
        # Runs the browser research pipeline server-side for top tourist cities so most real
        # queries never hit the rate-limited runtime path. The script quality-gates every
        # catalog and merges the previous deploy's good entries, so coverage converges across
        # deploys. A bad research day must degrade coverage, never break the deploy: on a hard
        # crash, fall back to the previous deploy's file rather than shipping an empty one.
        timeout-minutes: 50
        run: |
          node build-precomputed-catalogs.mjs --out precomputed-catalogs.json || echo "::warning::Precompute step failed; falling back to the previous deploy's catalogs."
          if [ ! -s precomputed-catalogs.json ]; then
            curl -fsS -o precomputed-catalogs.json "https://christopher-013.github.io/PlanToGuide/precomputed-catalogs.json" \
              || echo '{"generatedAt":"","count":0,"precomputedCatalogs":[]}' > precomputed-catalogs.json
          fi
      - name: Assemble standalone site
        run: |
          mkdir _site
          cp index.html robots.txt version.js catalogs.json precomputed-catalogs.json dynamic-catalog.js app.js styles.css export-styles.js icon-source.js photo-store.js trip-schema.js plan-x-guide-centered-compass-morph-clean-x.svg manifest.webmanifest sw.js _site/
          mkdir -p _site/icons
          cp icons/icon-192.png icons/icon-512.png _site/icons/
      - name: Verify artifact contents
        run: |
          missing=0
          for f in index.html robots.txt version.js catalogs.json precomputed-catalogs.json dynamic-catalog.js styles.css app.js trip-schema.js export-styles.js icon-source.js photo-store.js sw.js manifest.webmanifest icons/icon-192.png icons/icon-512.png plan-x-guide-centered-compass-morph-clean-x.svg; do
            if [ ! -f "_site/$f" ]; then
              echo "::error::Missing required file in deployment artifact: $f"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
