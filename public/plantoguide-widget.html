<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PlanToGuide</title>
  <style>
    :root{--ink:#173b35;--muted:#687a75;--cream:#f7f2e8;--paper:#fffdf8;--terra:#d66645;--gold:#e1b85a;--line:#ded8ca;--shadow:0 18px 50px rgba(32,61,54,.12);font-family:"DM Sans",Inter,system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--cream)}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(150deg,#f8f3e9,#edf3ee);min-height:100vh}.app{min-height:100vh;background:var(--paper)}
    button{font:inherit;color:inherit}.top{display:flex;align-items:center;gap:12px;padding:15px clamp(16px,3vw,34px);border-bottom:1px solid var(--line);background:rgba(255,253,248,.96)}
    .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.03em}.mark{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;color:white;background:var(--terra)}.destination{margin-left:auto;color:var(--muted);font-size:13px}.expand{border:1px solid var(--line);background:white;border-radius:999px;padding:8px 12px;cursor:pointer}
    .hero{position:relative;overflow:hidden;padding:30px clamp(18px,5vw,62px) 26px;color:white;background:radial-gradient(circle at 85% 10%,rgba(225,184,90,.36),transparent 28%),linear-gradient(120deg,#173b35,#24574e)}
    .hero:after{content:"✦";position:absolute;right:7%;top:-25px;font-size:150px;color:rgba(255,255,255,.05)}.eyebrow{text-transform:uppercase;letter-spacing:.18em;font-size:11px;font-weight:800;color:#f5cf7a}.hero h1{position:relative;margin:7px 0 5px;font-size:clamp(30px,6vw,58px);line-height:.98;letter-spacing:-.05em;max-width:780px}.hero p{margin:0;max-width:760px;color:#dce8e4;line-height:1.55}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.pill{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.12);font-size:12px}
    .daybar{display:flex;gap:8px;overflow:auto;padding:12px clamp(14px,3vw,32px);background:#f0e6d3;border-bottom:1px solid #d8cab2;scrollbar-width:thin}.day{min-width:112px;border:1px solid transparent;background:rgba(255,255,255,.7);border-radius:12px;padding:9px 12px;text-align:left;cursor:pointer}.day span{display:block;font-size:18px}.day small{color:var(--muted)}.day.active{color:white;background:var(--terra);box-shadow:0 8px 20px rgba(214,102,69,.25)}.day.active small{color:white}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 290px;gap:24px;padding:25px clamp(16px,4vw,46px) 95px;max-width:1500px;margin:auto}.main h2{font-size:clamp(25px,4vw,40px);letter-spacing:-.04em;margin:0}.sub{color:var(--muted);margin:5px 0 22px}.timeline{display:grid;gap:12px}.activity{display:grid;grid-template-columns:75px 42px 1fr;gap:10px;align-items:start;padding:16px;border:1px solid var(--line);border-radius:16px;background:white;box-shadow:0 8px 24px rgba(32,61,54,.05)}.time{font-size:12px;font-weight:800;color:var(--terra);padding-top:10px}.icon{display:grid;place-items:center;width:40px;height:40px;border-radius:12px;background:#f6ead9;font-size:20px}.activity h3,.card h3{margin:0 0 4px;font-size:16px}.activity p,.card p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}.tag{display:inline-block;color:var(--terra);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px}.tip{display:block;margin-top:7px;color:#7c6839;font-size:12px}
    .side{display:grid;align-content:start;gap:13px}.card{border:1px solid var(--line);border-radius:16px;padding:17px;background:white}.weather{color:white;background:linear-gradient(145deg,#d66645,#b24d33);border:0}.weather p{color:#fff0e9}.temps{font-size:27px;font-weight:800;margin:12px 0 4px}.notes{padding-left:18px;margin:10px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
    .options{display:grid;gap:16px}.meal-group h3{margin:0 0 9px}.option-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.option{padding:14px;border:1px solid var(--line);background:white;border-radius:14px}.option strong{display:block}.option small{color:var(--muted)}.option p{margin:7px 0 0;color:var(--muted);font-size:12px;line-height:1.45}
    .empty{padding:34px;border:1px dashed var(--line);border-radius:18px;text-align:center;background:white}.empty span{font-size:34px}.empty p{color:var(--muted)}
    .bottom{position:fixed;z-index:4;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:2px;padding:8px max(8px,env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom));background:rgba(255,253,248,.97);border-top:1px solid var(--line);backdrop-filter:blur(12px)}.tab{border:0;background:transparent;min-width:72px;padding:6px 9px;border-radius:10px;cursor:pointer;color:var(--muted)}.tab span,.tab small{display:block}.tab span{font-size:17px}.tab small{font-size:10px}.tab.active{color:white;background:var(--ink)}
    .refine{width:100%;border:0;background:var(--ink);color:white;border-radius:12px;padding:12px;margin-top:4px;cursor:pointer}.loading{display:grid;place-items:center;min-height:380px;text-align:center;padding:30px}.loading span{font-size:38px}.loading p{color:var(--muted)}
    @media(max-width:800px){.layout{grid-template-columns:1fr}.destination{display:none}.option-grid{grid-template-columns:1fr}.activity{grid-template-columns:62px 38px 1fr}.tab{min-width:53px;padding-inline:5px}.tab small{font-size:9px}}
  html,body,body *,button,input,select,textarea{font-family:Aptos,"Aptos Display","Segoe UI",Arial,sans-serif!important}
</style>
</head>
<body>
  <div id="root" class="app"><div class="loading"><div><span>↗</span><h2>PlanToGuide</h2><p>Preparing your itinerary…</p></div></div></div>
  <script>
    const sample={destination:"Lisbon, Portugal",startDate:"2026-09-14",endDate:"2026-09-16",interests:["tile-covered streets","seafood","local ceramics"],tripTitle:"Lisbon in color",intro:"Three unhurried days of viewpoints, old streets, memorable food, and Portuguese design.",weather:{summary:"Warm days with cooler Atlantic evenings",high:"78°F",low:"63°F",packingTip:"Bring walking shoes, light layers, and sun protection.",disclaimer:"Seasonal planning guidance; check a live forecast before departure."},planningNotes:["Reserve popular restaurants and timed-entry sights.","Confirm opening hours and transit work before each day.","Allow extra time for Lisbon's hills and tiled streets."],days:[
      {date:"2026-09-14",icon:"🏛️",title:"Old Lisbon & sunset views",neighborhood:"Baixa · Alfama",summary:"A historic first day moving uphill from the grand riverfront into Lisbon's oldest lanes.",activities:[{time:"9:00 AM",type:"Breakfast",icon:"☕",title:"Confeitaria Nacional",area:"Praça da Figueira",description:"Begin with coffee and a classic Portuguese pastry."},{time:"10:00 AM",type:"See",icon:"🏛️",title:"Praça do Comércio",area:"Baixa",description:"Walk the monumental riverfront square and Rua Augusta."},{time:"12:30 PM",type:"Lunch",icon:"🍽️",title:"O Trevo",area:"Chiado",description:"Try a bifana before continuing uphill."},{time:"2:00 PM",type:"Explore",icon:"🚋",title:"Alfama lanes",area:"Alfama",description:"Wander tiled facades, tiny squares, and cathedral viewpoints."},{time:"6:30 PM",type:"Evening",icon:"🌅",title:"Miradouro da Senhora do Monte",area:"Graça",description:"End with one of Lisbon's broadest sunset views.",planningTip:"Arrive 30 minutes before sunset."}],food:{breakfast:[{name:"Confeitaria Nacional",area:"Baixa",cuisine:"Portuguese bakery",why:"Historic room and classic pastries",price:"$"},{name:"Dear Breakfast",area:"Chiado",cuisine:"Modern café",why:"A polished all-day breakfast",price:"$$"},{name:"Pastelaria Santo António",area:"Alfama",cuisine:"Pastry shop",why:"Excellent pastéis near the old city",price:"$"}],lunch:[{name:"O Trevo",area:"Chiado",cuisine:"Portuguese",why:"Beloved bifana counter",price:"$"},{name:"Taberna Sal Grosso",area:"Santa Apolónia",cuisine:"Portuguese",why:"Creative small plates",price:"$$"},{name:"Time Out Market",area:"Cais do Sodré",cuisine:"Food hall",why:"Many local choices in one stop",price:"$$"}],dinner:[{name:"Prado",area:"Baixa",cuisine:"Modern Portuguese",why:"Seasonal cooking in a beautiful room",price:"$$$"},{name:"Ponto Final",area:"Almada",cuisine:"Portuguese seafood",why:"Riverfront tables and sunset views",price:"$$$"},{name:"O Velho Eurico",area:"Mouraria",cuisine:"Portuguese",why:"Lively take       {date:"2026-09-15",icon:"🌊",title:"Belém & the river",neighborhood:"Belém",summary:"Monuments, gardens, and design along the Tagus.",activities:[{time:"9:00 AM",type:"Breakfast",icon:"🥐",title:"Pastéis de Belém",area:"Belém",description:"Start with the original custard tart recipe."},{time:"10:00 AM",type:"See",icon:"⛪",title:"Jerónimos Monastery",area:"Belém",description:"Explore Manueline architecture and the cloister."},{time:"12:30 PM",type:"Lunch",icon:"🐟",title:"Nunes Real Marisqueira",area:"Belém",description:"A seafood lunch near the river."},{time:"2:30 PM",type:"See",icon:"🖼️",title:"MAAT",area:"Belém",description:"Contemporary art and architecture beside the Tagus."},{time:"5:00 PM",type:"Explore",icon:"🌊",title:"Belém river walk",area:"Belém",description:"Walk toward the Discoveries Monument and tower."}],food:{breakfast:[{name:"Pastéis de Belém",area:"Belém",cuisine:"Pastry shop",why:"The iconic custard tart",price:"$"},{name:"Darwin's Café",area:"Belém",cuisine:"Café",why:"River views",price:"$$"},{name:"The Mill",area:"Santos",cuisine:"Café",why:"Specialty coffee and brunch",price:"$$"}],lunch:[{name:"Nunes Real Marisqueira",area:"Belém",cuisine:"Seafood",why:"Celebrated shellfish",price:"$$$"},{name:"O Frade",area:"Belém",cuisine:"Alentejo",why:"Counter dining and regional dishes",price:"$$"},{name:"Este Oeste",area:"Belém",cuisine:"Italian-Asian",why:"Convenient MAAT terrace",price:"$$"}],dinner:[{name:"Canalha",area:"Estrela",cuisine:"Portuguese",why:"Modern neighborhood cooking",price:"$$$"},{name:"Cervejaria Ramiro",area:"Intendente",cuisine:"Seafood",why:"A Lisbon institution",price:"$$$"},{name:"Solar dos Presuntos",area:"Centro",cuisine:"Portuguese",why:"Classic northern specialties",price:"$$$"}]},shopping:[{name:"LX Factory",area:"Alcântara",bestFor:"Design and books",why:"Creative studios and independent stores"},{name:"Centro Cultural de Belém shop",area:"Belém",bestFor:"Museum gifts",why:"Portuguese art and design"},{name:"EmbaiXada",area:"Príncipe Real",bestFor:"Fashion",why:"Curated local designers"}]},
      {date:"2026-09-16",icon:"🛍️",title:"Design, markets & gardens",neighborhood:"Príncipe Real · Chiado",summary:"A slower final day for ceramics, gardens, and favorite city-center tastes.",activities:[{time:"9:30 AM",type:"Breakfast",icon:"☕",title:"Seagull Method Café",area:"Príncipe Real",description:"Relaxed specialty coffee and breakfast."},{time:"11:00 AM",type:"Shop",icon:"🛍️",title:"Embaixada",area:"Príncipe Real",description:"Browse Portuguese fashion and design."},{time:"1:00 PM",type:"Lunch",icon:"🍽️",title:"Atalho Real",area:"Príncipe Real",description:"Lunch in a leafy courtyard."},{time:"3:00 PM",type:"Explore",icon:"🌿",title:"Jardim Botânico",area:"Príncipe Real",description:"A quiet garden break among subtropical plants."},{time:"5:00 PM",type:"Shop",icon:"🏺",title:"Cerâmicas na Linha",area:"Chiado",description:"Finish with colorful Portuguese ceramics."}],food:{breakfast:[{name:"Seagull Method Café",area:"Príncipe Real",cuisine:"Café",why:"Creative breakfast plates",price:"$$"},{name:"Heim Café",area:"Santos",cuisine:"Brunch",why:"Popular local brunch",price:"$$"},{name:"Hello, Kristof",area:"São Bento",cuisine:"Café",why:"Coffee and magazines",price:"$"}],lunch:[{name:"Atalho Real",area:"Príncipe Real",cuisine:"Grill",why:"Courtyard setting",price:"$$"},{name:"A Cevicheria",area:"Príncipe Real",cuisine:"Peruvian-Portuguese",why:"Inventive seafood",price:"$$$"},{name:"Boubou's",area:"Príncipe Real",cuisine:"Modern",why:"Creative seasonal menu",price:"$$$"}],dinner:[{name:"Taberna da Rua das Flores",area:"Chiado",cuisine:"Portuguese",why:"Small plates in an intimate room",price:"$$"},{name:"Belcanto",area:"Chiado",cuisine:"Fine dining",why:"Celebrated Portuguese tasting menu",price:"$$$$"},{name:"Bairro do Avillez",area:"Chiado",cuisine:"Portuguese",why:"Multiple lively dining concepts",price:"$$$"}]},shopping:[{name:"Cerâmicas na Linha",area:"Chiado",bestFor:"Ceramics",why:"Colorful pieces sold by weight"},{name:"Claus Porto",area:"Chiado",bestFor:"Fragrance and soap",why:"Beautiful Portuguese packaging"},{name:"Livraria Bertrand",area:"Chiado",bestFor:"Books",why:"A historic bookshop and easy keepsake"}]}
    ]};

    let trip=window.openai?.toolOutput||sample,activeDay=0,activeTab="itinerary";
    const root=document.getElementById("root");
    const el=(tag,cls,text)=>{const node=document.createElement(tag);if(cls)node.className=cls;if(text!==undefined)node.textContent=text;return node};
    const fmt=(value)=>new Intl.DateTimeFormat("en-US",{weekday:"short",month:"short",day:"numeric"}).format(new Date(value+"T12:00:00"));
    function button(cls,text,onClick){const b=el("button",cls,text);b.type="button";b.onclick=onClick;return b}
    function render(){if(!trip?.days?.length)return;activeDay=Math.min(activeDay,trip.days.length-1);root.replaceChildren();
      const top=el("header","top"),brand=el("div","brand");brand.append(el("span","mark","↗"),el("span","","PlanToGuide"));top.append(brand,el("span","destination",trip.destination),button("expand","⛶ Full screen",()=>window.openai?.requestDisplayMode?.({mode:"fullscreen"})));root.append(top);
      const hero=el("section","hero");hero.append(el("div","eyebrow","Your personal itinerary"),el("h1","",trip.tripTitle),el("p","",trip.intro));const meta=el("div","meta");meta.append(el("span","pill",`${fmt(trip.startDate)} — ${fmt(trip.endDate)}`),el("span","pill",`${trip.days.length} days`),el("span","pill",trip.interests.slice(0,3).join(" · ")));hero.append(meta);root.append(hero);
      const bar=el("nav","daybar");trip.days.forEach((day,i)=>{const b=button(`day${i===activeDay?" active":""}`,"",()=>{activeDay=i;render()});b.append(el("span","",day.icon),el("small","",fmt(day.date)));bar.append(b)});root.append(bar);
      const layout=el("div","layout"),main=el("main","main"),side=el("aside","side");renderMain(main);renderSide(side);layout.append(main,side);root.append(layout);renderBottom();
    }
    function renderMain(main){const day=trip.days[activeDay];if(activeTab==="itinerary"){main.append(el("h2","",day.title),el("p","sub",`${day.neighborhood} · ${day.summary}`));const line=el("div","timeline");day.activities.forEach(item=>{const card=el("article","activity"),copy=el("div","");copy.append(el("span","tag",`${item.type} · ${item.area}`),el("h3","",item.title),el("p","",item.description));if(item.planningTip)copy.append(el("small","tip",`Tip: ${item.planningTip}`));card.append(el("div","time",item.time),el("div","icon",item.icon),copy);line.append(card)});main.append(line);return}
      if(activeTab==="food"){main.append(el("h2","","Food & dining"),el("p","sub",`Three choices for every meal on ${fmt(day.date)}.`));const options=el("div","options");[["☕ Breakfast",day.food.breakfast],["🥪 Lunch",day.food.lunch],["🍽️ Dinner",day.food.dinner]].forEach(([label,items])=>{const group=el("section","meal-group");group.append(el("h3","",label));const grid=el("div","option-grid");items.forEach(item=>{const card=el("article","option");card.append(el("strong","",item.name),el("small","",`${item.area} · ${item.cuisine}${item.price?` · ${item.price}`:""}`),el("p","",item.why));grid.append(card)});group.append(grid);options.append(group)});main.append(options);return}
      if(activeTab==="shop"){main.append(el("h2","","Shopping"),el("p","sub",`Popular finds for ${fmt(day.date)}.`));const grid=el("div","option-grid");day.shopping.forEach(item=>{const card=el("article","option");card.append(el("strong","",item.name),el("small","",`${item.area} · ${item.bestFor}`),el("p","",item.why));grid.append(card)});main.append(grid);return}
      if(activeTab==="maps"){main.append(el("h2","","Stops & neighborhoods"),el("p","sub",`Your route for ${fmt(day.date)}.`));const line=el("div","timeline");day.activities.filter(x=>x.type!=="Transit").forEach((item,i)=>{const card=el("article","activity");card.append(el("div","time",String(i+1).padStart(2,"0")),el("div","icon",item.icon),(()=>{const c=el("div","");c.append(el("span","tag",item.area),el("h3","",item.title),el("p","",item.description));return c})());line.append(card)});main.append(line);return}
      const info={home:["Trip overview","Everything is organized by date. Choose a date above, then use the sections below."],bookings:["Bookings","Confirmed hotels, tickets, tours, and restaurant reservations can appear here in a future connected version."],photos:["Photos","Your visual travel journal can live here in a future connected version."]}[activeTab];const empty=el("div","empty");empty.append(el("span","",activeTab==="photos"?"📷":activeTab==="bookings"?"✅":"↗"),el("h2","",info[0]),el("p","",info[1]));main.append(empty)}
    function renderSide(side){const w=el("section","card weather");w.append(el("span","tag","Seasonal outlook"),el("h3","",trip.weather.summary),el("div","temps",`${trip.weather.low} — ${trip.weather.high}`),el("p","",trip.weather.packingTip),el("p","",trip.weather.disclaimer));side.append(w);const n=el("section","card");n.append(el("span","tag","Before you go"),el("h3","","Planning notes"));const ul=el("ul","notes");trip.planningNotes.forEach(x=>ul.append(el("li","",x)));n.append(ul);side.append(n,button("refine","Refine this day in ChatGPT",()=>window.parent.postMessage({jsonrpc:"2.0",method:"ui/message",params:{role:"user",content:[{type:"text",text:`Refine ${fmt(trip.days[activeDay].date)} of my ${trip.destination} itinerary. Ask what I want to change, then update the PlanToGuide.`}] }},"*")))}
    function renderBottom(){const nav=el("nav","bottom");[["home","⌂","Home"],["itinerary","▦","Itinerary"],["bookings","✓","Bookings"],["maps","⌖","Maps"],["food","♨","Food"],["shop","◇","Shop"],["photos","□","Photos"]].forEach(([id,icon,label])=>{const b=button(`tab${activeTab===id?" active":""}`,"",()=>{activeTab=id;render()});b.append(el("span","",icon),el("small","",label));nav.append(b)});root.append(nav)}
    function update(data){if(!data?.days?.length)return;trip=data;activeDay=0;activeTab="itinerary";render()}
    window.addEventListener("openai:set_globals",e=>update(e.detail?.globals?.toolOutput||window.openai?.toolOutput),{passive:true});
    window.addEventListener("message",e=>{if(e.source!==window.parent)return;const m=e.data;if(m?.jsonrpc==="2.0"&&m.method==="ui/notifications/tool-result")update(m.params?.structuredContent)},{passive:true});
    render();
  </script>
